<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小狐狸的 AI 圓桌</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  :root {
    --bg: #f5f4f0; --card: #ffffff; --ink: #1f1e1c; --muted: #8a867e;
    --line: #e4e1da; --accent: #b05730;
    --claude: #cc7854; --codex: #10a37f; --gemini: #4285f4;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #191817; --card: #232220; --ink: #ece9e3; --muted: #979289;
            --line: #37352f; --accent: #d98d5f; }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font: 15px/1.65 -apple-system, "PingFang TC", "Noto Sans TC", sans-serif; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 24px 20px 80px; }
  h1 { font-size: 20px; margin: 0 0 16px; }
  h1 #t-sub { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 10px; }
  .topbar { display: flex; align-items: center; gap: 14px; }
  .topbar h1 { flex: 1; }
  button.lang { border: 1px solid var(--line); background: var(--card); color: var(--muted);
                border-radius: 8px; padding: 4px 10px; cursor: pointer; font: inherit;
                font-size: 13px; flex: none; }
  button.lang:hover { color: var(--ink); }
  .q::before { content: "你："; color: var(--muted); font-weight: 400; }
  html[lang="en"] .q::before { content: "You: "; }
  .fox { width: 92px; height: 92px; border-radius: 50%; object-fit: cover; flex: none;
         border: 2px solid var(--line); box-shadow: 0 4px 14px rgba(0,0,0,.12);
         animation: bob 3.2s ease-in-out infinite; }
  @keyframes bob { 0%, 100% { transform: translateY(0) rotate(-2deg); }
                   50% { transform: translateY(-5px) rotate(2deg); } }
  @media (max-width: 600px) { .fox { width: 64px; height: 64px; } }

  .ask { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
  textarea { flex: 1; min-height: 72px; max-height: 240px; resize: vertical;
             padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px;
             background: var(--card); color: var(--ink); font: inherit; }
  textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
  button.send { padding: 12px 22px; border: 0; border-radius: 12px; cursor: pointer;
                background: var(--accent); color: #fff; font: inherit; font-weight: 600; }
  button.send:disabled { opacity: .5; cursor: not-allowed; }
  button.reset { padding: 12px 16px; border: 1px solid var(--line); border-radius: 12px;
                 cursor: pointer; background: var(--card); color: var(--muted); font: inherit; }
  button.reset:hover { color: var(--ink); }
  .divider { display: flex; align-items: center; gap: 12px; color: var(--muted);
             font-size: 12.5px; margin: 28px 0; }
  .divider::before, .divider::after { content: ""; flex: 1; border-top: 1px solid var(--line); }

  .attach-chip { display: flex; align-items: center; gap: 10px; margin: 10px 0 0;
                 padding: 8px 12px; border: 1px solid var(--line); border-radius: 10px;
                 background: var(--card); width: fit-content; max-width: 100%; }
  .attach-chip[hidden] { display: none; }
  .attach-chip img { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; }
  .attach-chip span { font-size: 13px; color: var(--muted); overflow: hidden;
                      text-overflow: ellipsis; white-space: nowrap; }
  .attach-chip button { border: 0; background: none; color: var(--muted); cursor: pointer;
                        font-size: 14px; padding: 4px; }
  .attach-chip button:hover { color: var(--ink); }
  .qimg { display: block; max-height: 140px; max-width: 260px; border-radius: 10px;
          margin: 8px 0 0; border: 1px solid var(--line); }
  .hint { color: var(--muted); font-size: 12.5px; margin: 0 0 24px; }
  .toggles { display: flex; gap: 16px; margin: 0 0 6px; font-size: 13px; color: var(--muted); }
  .toggles label { display: flex; gap: 5px; align-items: center; cursor: pointer; }

  .round { margin-bottom: 32px; }
  .round .q { font-weight: 600; margin: 0 0 10px; white-space: pre-wrap; }
  .cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  @media (max-width: 900px) { .cols { grid-template-columns: 1fr; } }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px;
          padding: 14px 16px; min-height: 90px; }
  .card header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
                 font-weight: 600; font-size: 14px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .card .meta { margin-left: auto; color: var(--muted); font-weight: 400; font-size: 12px; }
  .card.claude .dot { background: var(--claude); }
  .card.codex  .dot { background: var(--codex); }
  .card.gemini .dot { background: var(--gemini); }

  .body { font-size: 14.5px; overflow-wrap: break-word; }
  .body > :first-child { margin-top: 0; } .body > :last-child { margin-bottom: 0; }
  .body pre { background: rgba(128,128,128,.12); padding: 10px 12px; border-radius: 8px;
              overflow-x: auto; font-size: 13px; }
  .body code { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .body p code, .body li code { background: rgba(128,128,128,.15); padding: 1px 5px; border-radius: 4px; }
  .body table { border-collapse: collapse; } .body td, .body th { border: 1px solid var(--line); padding: 4px 8px; }
  .err { color: #c0392b; white-space: pre-wrap; font-size: 13px; }
  .waiting { color: var(--muted); }
  .waiting::after { content: ""; display: inline-block; width: 1em; animation: dots 1.2s steps(4) infinite; }
  @keyframes dots { 0% { content: ""; } 25% { content: "."; } 50% { content: ".."; } 75% { content: "..."; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1><span id="t-title">小狐狸的 AI 圓桌</span> <span id="t-sub">同一個問題，三個 AI 一起回答</span></h1>
    <button class="lang" id="langBtn" title="Switch language">EN</button>
    <img class="fox" src="fox.png" alt="">
  </div>

  <div class="toggles">
    <label><input type="checkbox" id="on-claude" checked> <span id="t-name-claude">Claude</span></label>
    <label><input type="checkbox" id="on-codex" checked> <span id="t-name-codex">Codex（GPT）</span></label>
    <label><input type="checkbox" id="on-gemini" checked> <span id="t-name-gemini">Antigravity（Gemini）</span></label>
  </div>
  <div class="ask">
    <textarea id="prompt" autofocus></textarea>
    <button class="reset" id="attach" title="">📎</button>
    <button class="send" id="send">送出</button>
    <button class="reset" id="reset">新對話</button>
  </div>
  <input type="file" id="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden>
  <div class="attach-chip" id="chip" hidden>
    <img id="chip-img" alt="">
    <span id="chip-name"></span>
    <button id="chip-remove" title="">✕</button>
  </div>
  <p class="hint" id="t-hint"></p>

  <div id="rounds"></div>
</div>

<script>
const I18N = {
  zh: {
    title: '小狐狸的 AI 圓桌',
    sub: '同一個問題，三個 AI 一起回答',
    placeholder: '輸入你的問題…（⌘ + Enter 送出）',
    send: '送出', sending: '回覆中…',
    reset: '新對話', resetTitle: '清除三個 AI 的對話記憶，開始新對話',
    hint: '回答透過本機的 Claude CLI、Codex CLI、Antigravity CLI（agy）產生，通常需要 10 秒到 1 分鐘。三個 AI 都會記得同一場對話的上下文，按「新對話」可重新開始。',
    names: { claude: 'Claude', codex: 'Codex（GPT）', gemini: 'Antigravity（Gemini）' },
    waiting: '思考中',
    sec: (s) => s + ' 秒',
    divider: '新對話',
    errPrefix: '出錯了：\n', connFail: '連線失敗：', unknown: '未知錯誤',
    foxAlt: '拿著乒乓球拍和 MacBook 的小白狐',
    attach: '附加圖片（也可以直接貼上）', removeImg: '移除圖片', uploadFail: '圖片上傳失敗：',
    langBtn: 'EN', htmlLang: 'zh-Hant',
  },
  en: {
    title: 'Fox AI Roundtable',
    sub: 'One question, three AIs answer together',
    placeholder: 'Ask anything… (⌘ + Enter to send)',
    send: 'Send', sending: 'Waiting…',
    reset: 'New chat', resetTitle: "Clear all three AIs' memory and start fresh",
    hint: 'Answers are generated locally by the Claude CLI, Codex CLI and Antigravity CLI (agy), usually within 10s–1min. All three AIs remember the conversation context — click "New chat" to start over.',
    names: { claude: 'Claude', codex: 'Codex (GPT)', gemini: 'Antigravity (Gemini)' },
    waiting: 'Thinking',
    sec: (s) => s + 's',
    divider: 'New chat',
    errPrefix: 'Error:\n', connFail: 'Request failed: ', unknown: 'unknown error',
    foxAlt: 'A little white fox holding a ping-pong paddle and a MacBook',
    attach: 'Attach an image (paste works too)', removeImg: 'Remove image', uploadFail: 'Image upload failed: ',
    langBtn: '中', htmlLang: 'en',
  },
};

let lang = localStorage.getItem('lang') || (navigator.language.toLowerCase().startsWith('zh') ? 'zh' : 'en');
let L = I18N[lang];

const $ = (id) => document.getElementById(id);

function applyLang() {
  L = I18N[lang];
  document.documentElement.lang = L.htmlLang;
  document.title = L.title;
  $('t-title').textContent = L.title;
  $('t-sub').textContent = L.sub;
  $('t-hint').textContent = L.hint;
  $('prompt').placeholder = L.placeholder;
  $('send').textContent = pending > 0 ? L.sending : L.send;
  $('reset').textContent = L.reset;
  $('reset').title = L.resetTitle;
  $('langBtn').textContent = L.langBtn;
  document.querySelector('.fox').alt = L.foxAlt;
  $('attach').title = L.attach;
  $('chip-remove').title = L.removeImg;
  for (const p of ['claude', 'codex', 'gemini']) $('t-name-' + p).textContent = L.names[p];
}

// 圖片附件（一次一張）
let attachment = null; // { file, url }
function setAttachment(file) {
  clearAttachment();
  if (!file || !file.type.startsWith('image/')) return;
  attachment = { file, url: URL.createObjectURL(file) };
  $('chip-img').src = attachment.url;
  $('chip-name').textContent = file.name || 'image';
  $('chip').hidden = false;
}
function clearAttachment() {
  if (attachment) URL.revokeObjectURL(attachment.url);
  attachment = null;
  $('chip').hidden = true;
  $('file').value = '';
}

function render(md) {
  if (window.marked && window.DOMPurify) {
    return DOMPurify.sanitize(marked.parse(md));
  }
  const div = document.createElement('div');
  div.textContent = md;
  return '<pre style="white-space:pre-wrap">' + div.innerHTML + '</pre>';
}

let pending = 0;
function setPending(delta) {
  pending += delta;
  const btn = $('send');
  btn.disabled = pending > 0;
  btn.textContent = pending > 0 ? L.sending : L.send;
}

async function askOne(provider, prompt, card, image) {
  const body = card.querySelector('.body');
  const meta = card.querySelector('.meta');
  const t0 = Date.now();
  setPending(1);
  const tick = setInterval(() => { meta.textContent = L.sec(((Date.now() - t0) / 1000).toFixed(0)); }, 1000);
  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, prompt, image }),
    });
    const data = await res.json();
    clearInterval(tick);
    meta.textContent = L.sec(((data.elapsed ?? (Date.now() - t0)) / 1000).toFixed(1));
    if (data.ok) {
      body.innerHTML = render(data.answer);
    } else {
      body.innerHTML = '<div class="err"></div>';
      body.firstChild.textContent = L.errPrefix + (data.error || L.unknown);
    }
  } catch (err) {
    clearInterval(tick);
    meta.textContent = '';
    body.innerHTML = '<div class="err"></div>';
    body.firstChild.textContent = L.connFail + err;
  } finally {
    setPending(-1);
  }
}

async function ask() {
  const prompt = $('prompt').value.trim();
  if (!prompt) return;
  const enabled = ['claude', 'codex', 'gemini'].filter((p) => $('on-' + p).checked);
  if (!enabled.length) return;

  // 有附件先上傳（一次），三家共用同一張圖
  let image = null, imgUrl = null;
  if (attachment) {
    const { file, url } = attachment;
    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': file.type },
        body: file,
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      image = data.file;
      imgUrl = url;
      attachment = null; // 保留 object URL 給提問區顯示，不 revoke
      $('chip').hidden = true;
      $('file').value = '';
    } catch (err) {
      alert(L.uploadFail + err);
      return;
    }
  }

  const round = document.createElement('div');
  round.className = 'round';
  const q = document.createElement('p');
  q.className = 'q';
  q.textContent = prompt;
  if (imgUrl) {
    const im = document.createElement('img');
    im.className = 'qimg';
    im.src = imgUrl;
    q.appendChild(im);
  }
  const cols = document.createElement('div');
  cols.className = 'cols';
  round.append(q, cols);
  $('rounds').prepend(round);

  for (const p of enabled) {
    const card = document.createElement('div');
    card.className = 'card ' + p;
    card.innerHTML = '<header><span class="dot"></span>' + L.names[p] +
      '<span class="meta"></span></header><div class="body"><span class="waiting"></span></div>';
    card.querySelector('.waiting').textContent = L.waiting;
    cols.appendChild(card);
    askOne(p, prompt, card, image);
  }
  $('prompt').value = '';
  $('prompt').focus();
}

$('send').addEventListener('click', ask);
$('reset').addEventListener('click', async () => {
  await fetch('/api/reset', { method: 'POST' });
  const divider = document.createElement('div');
  divider.className = 'divider';
  divider.textContent = L.divider;
  $('rounds').prepend(divider);
  $('prompt').focus();
});
$('attach').addEventListener('click', () => $('file').click());
$('file').addEventListener('change', () => setAttachment($('file').files[0]));
$('chip-remove').addEventListener('click', clearAttachment);
$('prompt').addEventListener('paste', (e) => {
  const item = [...(e.clipboardData?.items || [])].find((i) => i.type.startsWith('image/'));
  if (item) { e.preventDefault(); setAttachment(item.getAsFile()); }
});
$('langBtn').addEventListener('click', () => {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', lang);
  applyLang();
});
applyLang();
$('prompt').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); ask(); }
});
</script>
</body>
</html>
